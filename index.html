<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE GLOBAL EDIT</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <div id="sidebar" style="display: none;">
        <button id="startOverBtn">Start Over</button>
        <button id="savePoemBtn">Save Poem</button>
    </div>

    <div id="overlay">
        <h1>PROJECT UNWRITE</h1>
        <p>Enter your word</p>
        <input type="text" id="keywordInput" placeholder="e.g. Stars, Water, Silence..." autofocus>
        <button id="generateBtn">GENERATE</button>
    </div>

    <div id="wall-container"></div>

    <script src="script.js"></script>
</body>
</html>
