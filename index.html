<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE GLOBAL EDIT</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <div id="overlay">
        <h1>THE GLOBAL EDIT</h1>
        <p>Enter a keyword to generate the world.</p>
        <input type="text" id="keywordInput" placeholder="e.g. Stars, Oceans, Silence..." autofocus>
        <button id="generateBtn">GENERATE</button>
    </div>

    <div id="wall-container"></div>

    <script src="script.js"></script>
    <button id="saveBtn" style="display:none; position: fixed; bottom: 20px; right: 20px; z-index: 100;">SAVE POEM</button>
</body>
</html>
